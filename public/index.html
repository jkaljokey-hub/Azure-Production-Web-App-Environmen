<!DOCTYPE html>
<html>
<head>
  <title>Staging App</title>

  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      background: linear-gradient(135deg, #7c2d12, #ea580c);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      text-align: center;
      background: rgba(255,255,255,0.05);
      padding: 50px;
      border-radius: 20px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.6);
      width: 500px;
      max-width: 90%;
    }

    .env-badge {
      display: inline-block;
      margin-bottom: 15px;
      padding: 6px 16px;
      background: #f97316;
      border-radius: 20px;
      font-size: 12px;
      font-weight: bold;
    }

    h1 {
      font-size: 64px;
      margin-bottom: 5px;
      letter-spacing: 3px;
      font-weight: bold;
    }

    .subtitle {
      font-size: 14px;
      color: #fed7aa;
      margin-bottom: 30px;
    }

    button {
      padding: 14px 30px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      background: #1e40af;
      color: white;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #1d4ed8;
      transform: scale(1.05);
    }

    #response {
      margin-top: 25px;
      font-size: 20px;
      font-weight: bold;
      color: #fde68a;
    }

    ul {
      margin-top: 20px;
      list-style: none;
      padding: 0;
    }

    li {
      background: rgba(255, 255, 255, 0.15);
      margin: 8px 0;
      padding: 14px;
      border-radius: 10px;
      font-size: 18px;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <div class="container">
   

    <h1>Staging</h1>
    <div class="subtitle">Testing Environment (Safe Deployment)</div>

    <button onclick="loadMessages()">Fetch Data</button>

    <p id="response"></p>
    <ul id="messagesList"></ul>
  </div>

  <script>
    async function loadMessages() {
      const responseText = document.getElementById("response");
      const list = document.getElementById("messagesList");

      try {
        responseText.innerText = "Loading...";
        list.innerHTML = "";

        const res = await fetch("/api/messages");

        if (!res.ok) {
          const text = await res.text();
          throw new Error(text);
        }

        const data = await res.json();

        if (data.length === 0) {
          responseText.innerText = "Connected, but no data found";
          return;
        }

        responseText.innerText = "Connected successfully to database";

        data.forEach(msg => {
          const li = document.createElement("li");
          li.innerText = `${msg.name} — ${msg.message}`;
          list.appendChild(li);
        });

      } catch (err) {
        console.error(err);
        responseText.innerText = "Database connection failed";
      }
    }

    // auto load on open (optional but nice)
    window.onload = loadMessages;
  </script>

</body>
</html>
