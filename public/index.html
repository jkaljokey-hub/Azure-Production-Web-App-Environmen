<!DOCTYPE html>
<html>
<head>
  <title>Production App</title>

  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      text-align: center;
      background: rgba(255,255,255,0.05);
      padding: 50px;
      border-radius: 20px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.6);
      width: 500px;
      max-width: 90%;
    }

    h1 {
      font-size: 64px;
      margin-bottom: 10px;
      letter-spacing: 3px;
      font-weight: bold;
    }

    .subtitle {
      font-size: 14px;
      color: #94a3b8;
      margin-bottom: 30px;
    }

    button {
      padding: 14px 30px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      background: #3b82f6;
      color: white;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #2563eb;
      transform: scale(1.05);
    }

    #response {
      margin-top: 25px;
      font-size: 20px;
      font-weight: bold;
      color: #38bdf8;
    }

    ul {
      margin-top: 20px;
      list-style: none;
      padding: 0;
    }

    li {
      background: rgba(255, 255, 255, 0.1);
      margin: 8px 0;
      padding: 12px;
      border-radius: 8px;
      font-size: 20px;
      text-align: center;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Production</h1>
    <div class="subtitle">Live Cloud Data from Azure SQL</div>

    <button onclick="loadMessages()">Fetch Data</button>

    <p id="response"></p>

    <ul id="messagesList"></ul>
  </div>

  <script>
    async function loadMessages() {
      try {
        const res = await fetch("/api/messages");
        const data = await res.json();

        document.getElementById("response").innerText =
          "Connected successfully to database";

        const list = document.getElementById("messagesList");
        list.innerHTML = "";

        data.forEach(msg => {
          const li = document.createElement("li");
          li.innerText = `${msg.name} — ${msg.message}`;
          list.appendChild(li);
        });

      } catch (err) {
        console.error(err);
        document.getElementById("response").innerText =
          "Error connecting to database";
      }
    }
  </script>

</body>
</html>
