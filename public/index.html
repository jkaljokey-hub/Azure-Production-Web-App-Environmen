<!DOCTYPE html>
<html>
<head>
  <title>Production App</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      text-align: center;
      background: rgba(255,255,255,0.05);
      padding: 40px;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    h1 {
      font-size: 48px;
      margin-bottom: 20px;
      letter-spacing: 2px;
    }

    button {
      padding: 12px 25px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      background: #3b82f6;
      color: white;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #2563eb;
      transform: scale(1.05);
    }

    ul {
      margin-top: 20px;
      list-style: none;
      padding: 0;
    }

    li {
      background: rgba(255,255,255,0.1);
      margin: 5px 0;
      padding: 10px;
      border-radius: 6px;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Production</h1>

    <button onclick="loadMessages()">Click Me</button>

    <p id="response"></p>

    <ul id="messagesList"></ul>
  </div>

  <script>
    async function loadMessages() {
      const res = await fetch("/api/messages");
      const data = await res.json();

      document.getElementById("response").innerText = "Hello from database 👋";

      const list = document.getElementById("messagesList");
      list.innerHTML = "";

      data.forEach(msg => {
        const li = document.createElement("li");
        li.innerText = `${msg.name} - ${msg.message}`;
        list.appendChild(li);
      });
    }
  </script>

</body>
</html>
